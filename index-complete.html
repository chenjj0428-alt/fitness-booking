                    <option value="营养指导">🥗 营养指导</option>
                    <option value="其他">❓ 其他</option>
                </select>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitBooking()">确认预约</button>

        <div class="footer-note">
            <p>⏱️ 每次咨询 <span class="highlight">30 分钟</span></p>
            <p>📍 线上视频咨询（微信）</p>
            <p>💰 费用：<span class="highlight">¥99/次</span> · 预约成功后支付</p>
            <p style="margin-top:15px;color:#bbb;font-size:11px;">我会在 24 小时内通过微信联系您确认详情</p>
        </div>
    </div>

    <!-- 成功弹窗 -->
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <h2>预约成功！</h2>
            <p>已收到您的预约申请</p>
            <div class="success-info">
                <p><strong>📅 日期：</strong><span id="successDate"></span></p>
                <p><strong>⏰ 时间：</strong><span id="successTime"></span></p>
                <p><strong>👤 姓名：</strong><span id="successName"></span></p>
                <p><strong>💬 问题：</strong><span id="successQuestion"></span></p>
            </div>
            <p style="font-size:13px;color:#999;margin-bottom:20px;">我会在 24 小时内通过微信联系您确认详情</p>
            <button class="close-btn" onclick="closeModal()">好的</button>
        </div>
    </div>

    <script>
        // ========== 配置区域 ==========
        const CONFIG = {
            price: '¥99/次',
            duration: '30 分钟',
            contactWechat: 'your_wechat', // 你的微信号
            maxDays: 7, // 显示未来 7 天
            timeSlots: [
                '09:00-09:30', '09:30-10:00', '10:00-10:30',
                '10:30-11:00', '11:00-11:30', '14:00-14:30',
                '14:30-15:00', '15:00-15:30', '15:30-16:00',
                '16:00-16:30', '19:00-19:30', '19:30-20:00'
            ]
        };

        // 模拟已预约数据（实际应从后端获取）
        const bookedSlots = {
            // 格式：'YYYY-MM-DD': ['09:00-09:30', '14:00-14:30']
        };

        // 从 localStorage 读取已预约数据
        function loadBookedSlots() {
            const stored = localStorage.getItem('bookedSlots');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    Object.assign(bookedSlots, parsed);
                } catch(e) {}
            }
        }

        // 保存已预约数据到 localStorage
        function saveBookedSlots() {
            localStorage.setItem('bookedSlots', JSON.stringify(bookedSlots));
        }

        let selectedDate = null;
        let selectedTime = null;

        // 生成未来 N 天日期
        function generateDates() {
            const dates = [];
            const today = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            
            for (let i = 0; i < CONFIG.maxDays; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const weekday = weekdays[date.getDay()];
                const dateStr = `${date.getFullYear()}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                dates.push({
                    str: dateStr,
                    display: `${month}/${day}`,
                    weekday: weekday,
                    isToday: i === 0,
                    isTomorrow: i === 1
                });
            }
            return dates;
        }

        // 渲染日期选择器
        function renderDates() {
            const container = document.getElementById('dateSelector');
            const dates = generateDates();
            
            container.innerHTML = dates.map((d, i) => `
                <div class="date-item ${i === 0 ? 'selected' : ''}" 
                     data-date="${d.str}" 
                     onclick="selectDate(this, '${d.str}')">
                    <div class="day">${d.isToday ? '今天' : d.isTomorrow ? '明天' : d.weekday}</div>
                    <div class="date">${d.display}</div>
                </div>
            `).join('');
            
            // 默认选择第一天
            if (dates.length > 0) {
                selectedDate = dates[0].str;
                renderTimeSlots();
            }
        }

        // 选择日期
        function selectDate(el, date) {
            document.querySelectorAll('.date-item').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedDate = date;
            selectedTime = null;
            renderTimeSlots();
        }

        // 渲染时间段
        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            const booked = bookedSlots[selectedDate] || [];
            
            container.innerHTML = CONFIG.timeSlots.map(time => {
                const isBooked = booked.includes(time);
                return `
                    <div class="time-slot ${isBooked ? 'disabled' : ''}" 
                         data-time="${time}"
                         onclick="${!isBooked ? `selectTime(this, '${time}')` : ''}">
                        <div class="time">${time}</div>
                        <div class="status">${isBooked ? '已约满' : '可预约'}</div>
                    </div>
                `;
            }).join('');
        }

        // 选择时间
        function selectTime(el, time) {
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selectedTime = time;
        }

        // 显示错误信息
        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        // 提交预约
        function submitBooking() {
            const name = document.getElementById('name').value.trim();
            const wechat = document.getElementById('wechat').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const question = document.getElementById('question').value.trim();
            const consultType = document.getElementById('consultType').value;

            // 验证
            if (!selectedDate) {
                showError('请选择日期');
                return;
            }
            if (!selectedTime) {
                showError('请选择时间段');
                return;
            }
            if (!name) {
                showError('请输入姓名');
                return;
            }
            if (!wechat) {
                showError('请输入微信号');
                return;
            }
            if (!question) {
                showError('请输入咨询问题');
                return;
            }

            // 检查时间段是否已被预约
            const booked = bookedSlots[selectedDate] || [];
            if (booked.includes(selectedTime)) {
                showError('该时间段已被预约，请选择其他时间');
                renderTimeSlots();
                return;
            }

            // 创建预约记录
            const booking = {
                id: Date.now(),
                date: selectedDate,
                time: selectedTime,
                name: name,
                wechat: wechat,
                phone: phone,
                question: question,
                consultType: consultType,
                createdAt: new Date().toISOString(),
                status: 'pending'
            };

            // 保存到 localStorage
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            bookings.push(booking);
            localStorage.setItem('bookings', JSON.stringify(bookings));

            // 标记时间段为已预约
            if (!bookedSlots[selectedDate]) {
                bookedSlots[selectedDate] = [];
            }
            bookedSlots[selectedDate].push(selectedTime);
            saveBookedSlots();

            // 显示成功
            document.getElementById('successDate').textContent = selectedDate;
            document.getElementById('successTime').textContent = selectedTime;
            document.getElementById('successName').textContent = name;
            document.getElementById('successQuestion').textContent = question.length > 20 ? question.substring(0, 20) + '...' : question;
            document.getElementById('successModal').classList.add('show');

            // 清空表单
            document.getElementById('name').value = '';
            document.getElementById('wechat').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('question').value = '';
            document.getElementById('consultType').value = '';

            // 刷新时间段
            renderTimeSlots();
        }

        // 关闭成功弹窗
        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadBookedSlots();
            renderDates();
        });
    </script>
</body>
</html>
