<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身咨询预约 - 1 对 1 专业线上指导</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; }
        .info-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .card { background: #f8f9fa; padding: 15px 10px; border-radius: 10px; text-align: center; }
        .card-icon { font-size: 24px; margin-bottom: 5px; }
        .card-text { font-size: 12px; color: #666; }
        .section-title { font-size: 18px; color: #333; margin-bottom: 15px; font-weight: 600; }
        .date-selector { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 30px; }
        .date-item { padding: 12px 5px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid #e9ecef; }
        .date-item:hover { border-color: #667eea; }
        .date-item.selected { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: #667eea; }
        .day { font-size: 12px; margin-bottom: 5px; }
        .date { font-size: 16px; font-weight: bold; }
        .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .time-slot { padding: 15px 10px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid #e9ecef; }
        .time-slot:hover:not(.disabled) { border-color: #667eea; }
        .time-slot.selected { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: #667eea; }
        .time-slot.disabled { opacity: 0.4; cursor: not-allowed; background: #f8f9fa; }
        .time { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .status { font-size: 11px; color: #999; }
        .time-slot.selected .status { color: rgba(255,255,255,0.8); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); }
        .footer-note { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e9ecef; }
        .footer-note p { text-align: center; color: #666; font-size: 13px; margin-bottom: 8px; }
        .highlight { color: #667eea; font-weight: 600; }
        .success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .success-modal.show { display: flex; }
        .success-content { background: white; border-radius: 20px; padding: 40px 30px; max-width: 400px; width: 90%; text-align: center; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .success-content h2 { font-size: 24px; color: #333; margin-bottom: 10px; }
        .success-info { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 20px 0; text-align: left; }
        .success-info p { margin-bottom: 10px; font-size: 14px; color: #666; }
        .close-btn { padding: 12px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">💪</div>
            <h1>健身咨询预约</h1>
            <p class="subtitle">1 对 1 专业线上指导</p>
        </div>

        <div class="info-cards">
            <div class="card">
                <div class="card-icon">🎯</div>
                <div class="card-text">个性化<br>方案</div>
            </div>
            <div class="card">
                <div class="card-icon">📊</div>
                <div class="card-text">科学<br>指导</div>
            </div>
            <div class="card">
                <div class="card-icon">💬</div>
                <div class="card-text">随时<br>沟通</div>
            </div>
        </div>

        <div class="section-title">📅 选择日期</div>
        <div class="date-selector" id="dateSelector"></div>

        <div class="section-title">⏰ 选择时间段</div>
        <div class="time-slots" id="timeSlots"></div>

        <div class="section-title">👤 个人信息</div>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" placeholder="请输入您的姓名">
        </div>
        <div class="form-group">
            <label>微信号</label>
            <input type="text" id="wechat" placeholder="请输入您的微信号">
        </div>
        <div class="form-group">
            <label>咨询类型</label>
            <select id="consultType">
                <option value="减脂">🔥 减脂塑形</option>
                <option value="增肌">💪 增肌力量</option>
                <option value="营养">🥗 营养指导</option>
                <option value="其他">❓ 其他</option>
            </select>
        </div>
        <div class="form-group">
            <label>主要问题</label>
            <textarea id="question" rows="3" placeholder="请简单描述您的问题或目标"></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitBooking()">确认预约</button>

        <div class="footer-note">
            <p>⏱️ 每次咨询 <span class="highlight">30 分钟</span></p>
            <p>📍 线上视频咨询（微信）</p>
            <p>💰 费用：<span class="highlight">¥99/次</span> · 预约成功后支付</p>
            <p style="margin-top:15px;color:#bbb;font-size:11px;">我会在 24 小时内通过微信联系您确认详情</p>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <h2>预约成功！</h2>
            <p>已收到您的预约申请</p>
            <div class="success-info">
                <p><strong>📅 日期：</strong><span id="successDate"></span></p>
                <p><strong>⏰ 时间：</strong><span id="successTime"></span></p>
                <p><strong>👤 姓名：</strong><span id="successName"></span></p>
                <p><strong>💬 问题：</strong><span id="successQuestion"></span></p>
            </div>
            <p style="font-size:13px;color:#999;margin-bottom:20px;">我会在 24 小时内通过微信联系您确认详情</p>
            <button class="close-btn" onclick="closeModal()">好的</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            price: '¥99/次',
            duration: '30 分钟',
            contactWechat: 'your_wechat',
            maxDays: 7,
            timeSlots: ['09:00-09:30','09:30-10:00','10:00-10:30','10:30-11:00','11:00-11:30','14:00-14:30','14:30-15:00','15:00-15:30','15:30-16:00','16:00-16:30','19:00-19:30','19:30-20:00']
        };

        const bookedSlots = {};
        let selectedDate = null;
        let selectedTime = null;

        function generateDates() {
            const dates = [];
            const today = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            for (let i = 0; i < CONFIG.maxDays; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const weekday = weekdays[date.getDay()];
                const dateStr = `${date.getFullYear()}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                dates.push({ str: dateStr, display: `${month}/${day}`, weekday: weekday, isToday: i === 0, isTomorrow: i === 1 });
            }
            return dates;
        }

        function renderDates() {
            const container = document.getElementById('dateSelector');
            const dates = generateDates();
            container.innerHTML = dates.map((d, i) => `
                <div class="date-item ${i === 0 ? 'selected' : ''}" data-date="${d.str}" onclick="selectDate(this, '${d.str}')">
                    <div class="day">${d.isToday ? '今天' : d.isTomorrow ? '明天' : d.weekday}</div>
                    <div class="date">${d.display}</div>
                </div>
            `).join('');
            if (dates.length > 0) { selectedDate = dates[0].str; renderTimeSlots(); }
        }

        function selectDate(el, date) {
            document.querySelectorAll('.date-item').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedDate = date;
            selectedTime = null;
            renderTimeSlots();
        }

        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            const booked = bookedSlots[selectedDate] || [];
            container.innerHTML = CONFIG.timeSlots.map(time => {
                const isBooked = booked.includes(time);
                return `
                    <div class="time-slot ${isBooked ? 'disabled' : ''}" data-time="${time}" ${!isBooked ? `onclick="selectTime(this, '${time}')"` : ''}>
                        <div class="time">${time}</div>
                        <div class="status">${isBooked ? '已约满' : '可预约'}</div>
                    </div>
                `;
            }).join('');
        }

        function selectTime(el, time) {
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selectedTime = time;
        }

        function submitBooking() {
            if (!selectedDate || !selectedTime) { alert('请选择日期和时间段'); return; }
            const name = document.getElementById('name').value.trim();
            const wechat = document.getElementById('wechat').value.trim();
            const question = document.getElementById('question').value.trim();
            if (!name || !wechat) { alert('请填写姓名和微信号'); return; }
            document.getElementById('successDate').textContent = selectedDate;
            document.getElementById('successTime').textContent = selectedTime;
            document.getElementById('successName').textContent = name;
            document.getElementById('successQuestion').textContent = question || '无';
            document.getElementById('successModal').classList.add('show');
            if (!bookedSlots[selectedDate]) bookedSlots[selectedDate] = [];
            bookedSlots[selectedDate].push(selectedTime);
            localStorage.setItem('bookedSlots', JSON.stringify(bookedSlots));
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() { renderDates(); });
    </script>
</body>
</html>
