<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身咨询预约</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; }
        .info-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .card { background: #f8f9fa; padding: 15px 10px; border-radius: 10px; text-align: center; }
        .card-icon { font-size: 24px; margin-bottom: 5px; }
        .card-text { font-size: 12px; color: #666; }
        .section-title { font-size: 18px; color: #333; margin-bottom: 15px; font-weight: 600; }
        .date-selector { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 30px; }
        .date-item { padding: 12px 5px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid #e9ecef; }
        .date-item.selected { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: #667eea; }
        .day { font-size: 12px; margin-bottom: 5px; }
        .date { font-size: 16px; font-weight: bold; }
        .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .time-slot { padding: 15px 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid #e9ecef; }
        .time-slot.selected { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: #667eea; }
        .time-slot.disabled { opacity: 0.4; cursor: not-allowed; background: #f8f9fa; }
        .time { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .status { font-size: 11px; color: #999; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 14px; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .footer-note { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e9ecef; text-align: center; color: #666; font-size: 13px; }
        .highlight { color: #667eea; font-weight: 600; }
        .success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .success-modal.show { display: flex; }
        .success-content { background: white; border-radius: 20px; padding: 40px 30px; max-width: 400px; width: 90%; text-align: center; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .success-info { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 20px 0; text-align: left; }
        .success-info p { margin-bottom: 10px; font-size: 14px; color: #666; }
        .close-btn { padding: 12px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">💪</div>
            <h1>健身咨询预约</h1>
            <p class="subtitle">1 对 1 专业线上指导</p>
        </div>
        <div class="info-cards">
            <div class="card"><div class="card-icon">🎯</div><div class="card-text">个性化<br>方案</div></div>
            <div class="card"><div class="card-icon">📊</div><div class="card-text">科学<br>指导</div></div>
            <div class="card"><div class="card-icon">💬</div><div class="card-text">随时<br>沟通</div></div>
        </div>
        <div class="section-title">📅 选择日期</div>
        <div class="date-selector" id="dateSelector"></div>
        <div class="section-title">⏰ 选择时间段</div>
        <div class="time-slots" id="timeSlots"></div>
        <div class="section-title">👤 个人信息</div>
        <div class="form-group"><label>姓名</label><input type="text" id="name" placeholder="请输入您的姓名"></div>
        <div class="form-group"><label>微信号</label><input type="text" id="wechat" placeholder="请输入您的微信号"></div>
        <div class="form-group"><label>咨询类型</label><select id="consultType"><option value="减脂">🔥 减脂塑形</option><option value="增肌">💪 增肌力量</option><option value="营养">🥗 营养指导</option><option value="其他">❓ 其他</option></select></div>
        <div class="form-group"><label>主要问题</label><textarea id="question" rows="3" placeholder="请简单描述您的问题或目标"></textarea></div>
        <button class="submit-btn" onclick="submitBooking()">确认预约</button>
        <div class="footer-note">
            <p>⏱️ 每次咨询 <span class="highlight">30 分钟</span></p>
            <p>📍 线上视频咨询（微信）</p>
            <p>💰 费用：<span class="highlight">¥99/次</span></p>
        </div>
    </div>
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <h2>预约成功！</h2>
            <div class="success-info">
                <p><strong>📅 日期：</strong><span id="successDate"></span></p>
                <p><strong>⏰ 时间：</strong><span id="successTime"></span></p>
                <p><strong>👤 姓名：</strong><span id="successName"></span></p>
            </div>
            <button class="close-btn" onclick="closeModal()">好的</button>
        </div>
    </div>
    <script>
        var timeSlotsList = ['12:00-12:30','12:30-13:00','13:00-13:30','13:30-14:00','19:30-20:00','20:00-20:30','20:30-21:00','21:00-21:30','21:30-22:00'];
        var selectedDate = '';
        var selectedTime = '';
        
        // 初始化
        window.onload = function() {
            renderDates();
        };
        
        // 渲染日期
        function renderDates() {
            var html = '';
            var today = new Date();
            var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            for (var i = 0; i < 7; i++) {
                var date = new Date(today);
                date.setDate(today.getDate() + i);
                var month = date.getMonth() + 1;
                var day = date.getDate();
                var weekday = weekdays[date.getDay()];
                var dateStr = date.getFullYear() + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
                var dayText = (i === 0) ? '今天' : ((i === 1) ? '明天' : weekday);
                var selectedClass = (i === 0) ? 'selected' : '';
                if (i === 0) selectedDate = dateStr;
                html += '<div class="date-item ' + selectedClass + '" onclick="selectDate(this,\'' + dateStr + '\')">';
                html += '<div class="day">' + dayText + '</div><div class="date">' + month + '/' + day + '</div></div>';
            }
            document.getElementById('dateSelector').innerHTML = html;
            renderTimeSlots();
        }
        
        // 选择日期
        function selectDate(el, date) {
            var items = document.querySelectorAll('.date-item');
            for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
            el.classList.add('selected');
            selectedDate = date;
            selectedTime = '';
            renderTimeSlots();
        }
        
        // 渲染时间段
        function renderTimeSlots() {
            var html = '';
            for (var i = 0; i < timeSlotsList.length; i++) {
                var time = timeSlotsList[i];
                html += '<div class="time-slot" onclick="selectTime(this,\'' + time + '\')">';
                html += '<div class="time">' + time + '</div><div class="status">可预约</div></div>';
            }
            document.getElementById('timeSlots').innerHTML = html;
        }
        
        // 选择时间
        function selectTime(el, time) {
            var slots = document.querySelectorAll('.time-slot');
            for (var i = 0; i < slots.length; i++) slots[i].classList.remove('selected');
            el.classList.add('selected');
            selectedTime = time;
        }
        
        // 提交预约
        function submitBooking() {
            if (!selectedDate || !selectedTime) {
                alert('请选择日期和时间段');
                return;
            }
            var name = document.getElementById('name').value.trim();
            var wechat = document.getElementById('wechat').value.trim();
            if (!name || !wechat) {
                alert('请填写姓名和微信号');
                return;
            }
            document.getElementById('successDate').textContent = selectedDate;
            document.getElementById('successTime').textContent = selectedTime;
            document.getElementById('successName').textContent = name;
            document.getElementById('successModal').classList.add('show');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
            location.reload();
        }
    </script>
</body>
</html>
